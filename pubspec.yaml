name: camlotus
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+25123001

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # File picker for opening images
  file_picker: ^8.1.2

  # Image processing and edge detection
  image: ^4.3.0

  # Camera (flutter_webrtc for all platforms; local patch for Android focus distance)
  flutter_webrtc:
    path: third_party/flutter_webrtc
  shared_preferences: ^2.3.3
  gal: ^2.3.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

