name: camlotus
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+25123001

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # File picker for opening images
  file_picker: ^8.1.2

  # Image processing and edge detection
  image: ^4.3.0

  # Camera, persistence, gallery, permissions
  camera: ^0.11.0+2
  shared_preferences: ^2.3.3
  gal: ^2.3.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Use local clone of camera_android_camerax with FocusDistanceBridge for LENS_FOCUS_DISTANCE.
dependency_overrides:
  camera_android_camerax:
    path: packages/camera_android_camerax

flutter:
  uses-material-design: true
  generate: true

